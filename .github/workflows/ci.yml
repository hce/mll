name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --workspace

  lua-compat:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build compiler
        run: cargo build --release

      - name: Install Lua versions
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.1 lua5.4 luajit

      - name: Test Lua 5.1
        run: ./mll-tests/lua-compat.sh lua5.1

      - name: Test Lua 5.4
        run: ./mll-tests/lua-compat.sh lua5.4

      - name: Test LuaJIT
        run: ./mll-tests/lua-compat.sh luajit

  merge:
    needs: [test, lua-compat]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Merge dev into main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git merge origin/dev --ff-only
          git push origin main

  wasm:
    needs: merge
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build wasm
        run: wasm-pack build mllc-wasm --target web --out-dir ../web/test/pkg

      - name: Upload wasm artifact
        uses: actions/upload-artifact@v4
        with:
          name: mllc-wasm
          path: web/test/pkg/
